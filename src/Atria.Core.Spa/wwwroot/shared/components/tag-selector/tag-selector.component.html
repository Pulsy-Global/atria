<div class="flex flex-col gap-3 w-full">
    <label *ngIf="showLabel" class="text-sm font-medium text-default">Tags</label>
    
    <div class="flex flex-wrap gap-2" *ngIf="selectedTags.length > 0">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium 
                    text-gray-800 transition-all hover:brightness-95 max-w-[180px] min-w-0" 
             *ngFor="let tag of selectedTags"
             [style.background-color]="getTagColor(tag.id!)"
             [matTooltip]="tag.name">
            <span class="leading-5 overflow-hidden text-ellipsis whitespace-nowrap min-w-0">{{ tag.name }}</span>
            <button 
                type="button" 
                class="tag-remove-button flex items-center justify-center w-4 h-4 rounded-full border-0 
                       cursor-pointer flex-shrink-0 bg-gray-900/20 hover:bg-gray-900/30 transition-colors"
                (click)="removeTag(tag.id!)"
                [attr.aria-label]="'Remove ' + tag.name">
                <mat-icon class="!text-xs !w-3 !h-3">close</mat-icon>
            </button>
        </div>
    </div>

    <div class="relative flex items-center">
        <mat-icon class="absolute left-3 text-secondary icon-size-5 pointer-events-none">search</mat-icon>
        <input
            type="text"
            class="w-full py-2.5 pl-10 pr-3 border rounded-lg text-sm text-default 
                   placeholder:text-secondary focus:outline-none focus:border-primary 
                   focus:ring-3 focus:ring-primary/10 transition-all"
            placeholder="Search or create tags..."
            [formControl]="searchControl"
            [matAutocomplete]="auto">
        
        <mat-autocomplete 
            #auto="matAutocomplete" 
            (opened)="onAutocompleteOpened()"
            (optionSelected)="selectTag($event.option.value)">
            
            <mat-option 
                *ngIf="canCreateTag" 
                (onSelectionChange)="$event.isUserInput && openCreateTagModal()">
                <div class="flex items-center gap-3">
                    <div class="w-5 h-5 rounded flex items-center justify-center bg-primary/10">
                        <mat-icon class="text-primary !text-base !flex !items-center !justify-center !m-0 !p-0">add</mat-icon>
                    </div>
                    <span 
                        class="text-sm overflow-hidden text-ellipsis whitespace-nowrap block"
                        [style.max-width]="tagNameMaxWidth">
                        Create "{{ searchValue }}"
                    </span>
                </div>
            </mat-option>
            
            <mat-option 
                *ngFor="let tag of filteredTags$ | async" 
                [value]="tag"
                [matTooltip]="tag.name">
                <div class="flex items-center gap-3">
                    <div class="w-5 h-5 rounded flex-shrink-0" [style.background-color]="getTagColor(tag.id!)"></div>
                    <span 
                        class="text-sm overflow-hidden text-ellipsis whitespace-nowrap block"
                        [style.max-width]="tagNameMaxWidth">
                        {{ tag.name }}
                    </span>
                </div>
            </mat-option>
        </mat-autocomplete>
    </div>
</div>
