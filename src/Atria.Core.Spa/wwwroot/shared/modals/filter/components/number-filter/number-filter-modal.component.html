<div class="!flex !justify-between !items-center !text-left text-lg p-0 font-semibold">
    <div class="flex items-center">
        <mat-icon class="mr-3 text-default">
            filter_list
        </mat-icon>
        <span class="text-default">
            {{ data.columnConfig.label }}
        </span>
    </div>
    <button mat-icon-button
        class="small-icon-button"
        (click)="onCancel()">
        <mat-icon class="text-default">close</mat-icon>
    </button>
</div>

<div class="flex flex-col w-full py-6 mt-3 mb-1">
    <div class="flex flex-col">
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>From</mat-label>
            <input matInput
                   type="number"
                   [(ngModel)]="fromValue"
                   placeholder="Min value">
            <mat-hint class="-ml-3 mt-1 text-secondary text-xs">Empty - Min value</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full mt-5">
            <mat-label>To</mat-label>
            <input matInput
                   type="number"
                   [(ngModel)]="toValue"
                   placeholder="Max value">
            <mat-hint class="-ml-3 mt-1 text-secondary text-xs">Empty - Max value</mat-hint>
        </mat-form-field>
    </div>
</div>

<div class="flex flex-row justify-end items-center gap-2">
    <button mat-button (click)="onClear()">
        <mat-icon class="pr-3">clear</mat-icon>
        Clear
    </button>
    <button mat-raised-button
            color="primary"
            [disabled]="!canConfirm"
            (click)="onFilter()">
        Apply Filter
    </button>
</div>
