<ng-template #navItems let-items="items">
    <button
        *ngFor="let item of items; trackBy: trackByType"
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-base text-secondary w-auto lg:self-stretch whitespace-nowrap"
        [ngClass]="{
            'bg-hover text-default ring-1 ring-inset ring-neutral-900/10': selectedType === item.type && !item.comingSoon,
            'hover:bg-hover hover:text-default': !item.comingSoon,
            'opacity-50 cursor-default': item.comingSoon
        }"
        (click)="!item.comingSoon && selectTab.emit(item.type)">
        <mat-icon class="text-base">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
        <span
            *ngIf="item.comingSoon"
            class="ml-1 inline-flex items-center rounded-full bg-amber-500/10 px-2 py-0.5 text-[10px] font-semibold text-amber-600"
            aria-hidden="true">
            Soon
        </span>
        <span
            *ngIf="item.section === 'components' && !item.isAdded && !item.comingSoon"
            class="ml-1 inline-flex h-5 w-5 items-center justify-center rounded-full bg-primary/10 text-xs font-semibold text-primary"
            aria-hidden="true">
            +
        </span>
        <span
            *ngIf="item.section === 'components' && item.closable && item.isAdded && !item.comingSoon"
            class="ml-1 inline-flex h-5 w-5 items-center justify-center rounded-full text-secondary hover:text-default lg:hidden"
            role="button"
            tabindex="0"
            (click)="closeTab.emit(item.type); $event.stopPropagation()"
            [attr.aria-label]="'Close ' + item.label">
            <mat-icon class="!text-xs !w-3.5 !h-3.5">close</mat-icon>
        </span>
    </button>
</ng-template>

<aside class="hidden lg:flex w-56 shrink-0 flex-col rounded-2xl bg-card p-4 sticky top-6 h-fit">
    <div class="mb-4 text-xs uppercase tracking-[0.2em] text-secondary">Workspace</div>
    <div class="flex flex-col gap-1">
        <ng-container *ngTemplateOutlet="navItems; context: { items: primaryItems }"></ng-container>
    </div>

    <div *ngIf="componentItems.length > 0" class="mt-4">
        <div class="mb-2 text-xs uppercase tracking-[0.2em] text-secondary">Components</div>
        <div class="flex flex-col gap-1">
            <ng-container *ngTemplateOutlet="navItems; context: { items: componentItems }"></ng-container>
        </div>
    </div>
</aside>

<div class="lg:hidden flex flex-col gap-3 pb-2">
    <div class="flex items-center gap-2 overflow-x-auto">
        <ng-container *ngTemplateOutlet="navItems; context: { items: primaryItems }"></ng-container>
    </div>
    <div *ngIf="componentItems.length > 0">
        <div class="mb-2 text-xs uppercase tracking-[0.2em] text-secondary">Components</div>
        <div class="flex items-center gap-2 overflow-x-auto">
            <ng-container *ngTemplateOutlet="navItems; context: { items: componentItems }"></ng-container>
        </div>
    </div>
</div>
