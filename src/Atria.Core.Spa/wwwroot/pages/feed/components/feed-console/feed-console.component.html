<div class="feed-console-shell flex flex-col rounded-3xl border border-slate-200/80 ring-1 ring-slate-900/10 bg-card overflow-hidden transition-all duration-300 dark:border-zinc-700/70 dark:ring-black/40"
     [ngClass]="{
         'is-testing': isProcessingAnimation,
         'is-success': statusPulse === 'success',
        'is-error': statusPulse === 'error',
        'h-auto': !isExpanded,
        'h-[420px]': isExpanded
    }">

    <div class="flex items-center justify-between gap-4 px-4 py-3">
        <button type="button"
                class="flex flex-1 min-w-0 items-center gap-6 rounded-xl px-2 py-1 text-left transition-colors hover:bg-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/50"
                (click)="toggle()">
            <mat-icon class="text-primary transition-transform duration-200"
                      [ngClass]="{'rotate-90': isExpanded}">
                chevron_right
            </mat-icon>

            <div class="flex items-center gap-2">
                <mat-icon class="text-default">terminal</mat-icon>
                <span class="text-base font-semibold text-default">
                    Test Console
                </span>
            </div>

            <div *ngIf="testPassed && !isTestRunning"
                 class="inline-flex items-center gap-0.5 px-2 py-0.5 bg-green-50 rounded-md border border-green-200">
                <mat-icon class="!text-sm !w-3.5 !h-3.5 !leading-none -ml-1.5 text-green-600 flex-shrink-0">check_circle</mat-icon>
                <span class="text-xs font-medium text-green-700 -ml-1 leading-tight">Passed</span>
            </div>

            <div *ngIf="testFailed && !isTestRunning"
                 class="inline-flex items-center gap-0.5 px-2 py-0.5 bg-red-50 rounded-md border border-red-200">
                <mat-icon class="!text-sm !w-3.5 !h-3.5 !leading-none -ml-1.5 text-red-600 flex-shrink-0">cancel</mat-icon>
                <span class="text-xs font-medium text-red-700 -ml-1 leading-tight">Failed</span>
            </div>
        </button>

        <div class="flex flex-wrap items-center justify-end gap-2">
            <button
                *ngIf="showTestButton"
                mat-raised-button
                color="primary"
                class="bg-primary text-primary-contrast hover:bg-primary-600"
                [disabled]="!canAttemptTest"
                (click)="open(); testFeed.emit(); $event.stopPropagation();">
                <mat-icon class="mr-2 text-primary-contrast">science</mat-icon>
                <span>Test Feed</span>
            </button>

            <button
                *ngIf="showDeployButton"
                mat-raised-button
                color="primary"
                class="bg-primary text-primary-contrast hover:bg-primary-600"
                [disabled]="isDeployDisabled"
                (click)="deploy.emit(); $event.stopPropagation();">
                <mat-spinner *ngIf="isDeploying" diameter="18" class="mr-2"></mat-spinner>
                <mat-icon *ngIf="!isDeploying" class="mr-2 text-primary-contrast">rocket_launch</mat-icon>
                <span *ngIf="!isDeploying" class="text-primary-contrast">Deploy</span>
            </button>
        </div>
    </div>

    <div *ngIf="isExpanded" class="flex flex-col h-full">
        <div class="px-6 py-4 bg-card border-b border-t">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 flex-1">
                    <mat-form-field class="flex-1 md:flex-initial md:!w-40" appearance="outline" subscriptSizing="dynamic">
                        <mat-label>Block Number</mat-label>
                        <input
                            matInput
                            type="number"
                            [formControl]="testForm.get('testBlockNumber')"
                            placeholder="Enter block">
                        <button mat-icon-button
                                matSuffix
                                (click)="loadLatestBlock.emit(); $event.stopPropagation()"
                                [disabled]="!canLoadLatestBlock"
                                matTooltip="Load latest block"
                                matTooltipPosition="after"
                                class="!w-6 !h-6 !min-w-6 !min-h-6 mr-1">
                            <mat-spinner *ngIf="isLoadingLatestBlock"
                                         diameter="16">
                            </mat-spinner>
                            <mat-icon *ngIf="!isLoadingLatestBlock"
                                      class="!text-base !w-4 !h-4">
                                refresh
                            </mat-icon>
                        </button>
                    </mat-form-field>

                    <mat-checkbox
                        *ngIf="hasOutputs"
                        [formControl]="testForm.get('executeOutputs')"
                        class="text-sm flex-1 md:flex-initial">
                        Execute Outputs
                    </mat-checkbox>

                    <mat-checkbox
                        [checked]="isAutoCollapse"
                        (change)="isAutoCollapse = $event.checked"
                        class="text-sm flex-1 md:flex-initial">
                        Auto-collapse
                    </mat-checkbox>
                </div>

                <div class="flex items-center gap-3">
                    <button
                        *ngIf="testPassed"
                        mat-stroked-button
                        [disabled]="!canAttemptTest"
                        (click)="runTest.emit(); $event.stopPropagation();"
                        class="!h-9 flex-1 md:flex-initial rounded-[0.55rem] border bg-hover px-4 font-mono text-[0.72rem] uppercase tracking-[0.08em] text-default shadow-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="flex items-center gap-2">
                            <mat-spinner *ngIf="isTestRunning" diameter="16"></mat-spinner>
                            <mat-icon *ngIf="!isTestRunning" class="!text-lg">play_arrow</mat-icon>
                            <span>{{ isTestRunning ? 'Running...' : 'Re-run Test' }}</span>
                        </div>
                    </button>

                    <button
                        mat-stroked-button
                        [disabled]="consoleOutput.length === 0"
                        (click)="clearOutput(); $event.stopPropagation();"
                        class="!h-9 flex-1 md:flex-initial rounded-[0.55rem] border bg-hover px-4 font-mono text-[0.72rem] uppercase tracking-[0.08em] text-default shadow-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="flex items-center gap-2">
                            <mat-icon class="!text-lg mr-1">delete_sweep</mat-icon>
                            <span>Clear</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 bg-card font-mono text-sm relative">
            <div *ngIf="consoleOutput.length === 0"
                 class="absolute inset-0 flex flex-col items-center justify-center text-secondary">
                <mat-icon class="!text-6xl !w-16 !h-16 mb-4 opacity-40">
                    terminal
                </mat-icon>
                <p class="text-base font-medium mb-1">
                    No output yet
                </p>
                <p class="text-xs text-secondary">
                    Run a test to see console output
                </p>
            </div>
            <div *ngIf="consoleOutput.length > 0"
                 class="absolute inset-0 p-4 overflow-y-auto overscroll-contain">
                <div *ngFor="let line of consoleOutput"
                     class="whitespace-pre-wrap py-0.5 leading-relaxed hover:bg-hover px-2
                            -mx-2 rounded transition-colors text-default">
                    {{ line }}
                </div>
            </div>
        </div>
    </div>

</div>
