name: Build and Push Multi-arch Images

on:
  push:
    branches: [develop]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: pulsy-global

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: atria-core-api
            dockerfile: src/Atria.Core.Api/Dockerfile
            context: .
          - name: atria-core-spa
            dockerfile: src/Atria.Core.Spa/Dockerfile
            context: .
          - name: atria-feed-ingestor
            dockerfile: src/Atria.Feed.Ingestor/Dockerfile
            context: .
          - name: atria-feed-runtime
            dockerfile: src/Atria.Feed.Runtime/Dockerfile
            context: .
          - name: atria-feed-delivery
            dockerfile: src/Atria.Feed.Delivery/Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
